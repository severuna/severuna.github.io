<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/index.css">
    <title>Severuna</title>
</head>
<body>
    <header class="header flex-row">
        <a href="." class="logo">Severuna</a>
        <nav class="header-nav flex-row">
            <a href="#about" class="header-link">About</a>
            <a href="#stack" class="header-link">Tech Stack</a>
            <a href="#projects" class="header-link">Projects</a>
            <a href="#contact" class="header-link">Contact</a>
        </nav>
    </header>
    <main class="main flex-row">
        <div class="main-descripion flex-column">
            <h1 class="main-title">Congratulations! <br>
                My name is <span>Oksana Fomenkova</span>.</h1>
            <p class="main-subtitle">I am a frontend developer</p>
            <a href="https://github.com/severuna" class="main-btn" target="_blank">View GitHub</a>
        </div>
        <img src="./images/Oksana.jpg" alt="Oksana" class="main-img">
    </main>
    <section id="stack" class="stack flex-column">
        <h2 class="title">My Tech Stack</h2>
        <p class="subtitle"> Technologies I've been working with recently</p>
        <div class="stack-container flex-row">
            <img src="./images/html-logo.svg" alt="HTML" class="stack-item" title="HTML">
            <img src="./images/css-logo.svg" alt="CSS" class="stack-item" title="CSS">
            <img src="./images/js-logo.svg" alt="JavaScript" class="stack-item" title="JavaScript">
            <img src="./images/react-logo.svg" alt="React" class="stack-item" title="React">
            <img src="./images/bootstrap-logo.svg" alt="Bootstrap" class="stack-item" title="Bootstrap">
            <img src="./images/sass-logo.svg" alt="Sass" class="stack-item" title="Sass">
            <img src="./images/git-logo.svg" alt="Git" class="stack-item" title="Git">
            <img src="./images/vs-logo.svg" alt="VS Code" class="stack-item" title="VS Code">
            <img src="./images/github-logo.svg" alt="GitHub" class="stack-item" title="GitHub">
        </div>
    </section>
    <section id="projects" class="projects flex-column">
        <h2 class="title">Projects</h2>
        <p class="subtitle">Things I've built so far</p>
        <div class="projects-container flex-row">
            <p class="subtitle">Examples of work will be added later!</p>
        </div>
    </section>
</body>
</html>
